# Runtime Service — Docker Compose for Local Development
#
# Starts all infrastructure dependencies locally so you can run
# the runtime service without any external cloud services.
#
# Usage:
#   docker compose up -d         → Start all services in background
#   docker compose down          → Stop all services
#   docker compose logs -f nats  → Follow logs of a specific service
#
# Services started:
#   - PostgreSQL  → Primary database (Runtime Registry)
#   - Redis       → Cache and rate limiting
#   - NATS        → Event bus for inter-service communication

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: runtime_service
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring dashboard
    command: ["--jetstream", "--http_port", "8222"]

volumes:
  postgres_data:
